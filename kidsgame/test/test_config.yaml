# Test Configuration for Kids Game Template
# This file defines the test suite configuration and parameters

# Test Suite Configuration
test_suite:
  name: "Kids Game Template Test Suite"
  version: "1.0.0"
  description: "Comprehensive test suite for Kids Game Template Flutter app"
  
# Test Categories
categories:
  unit_tests:
    enabled: true
    timeout: 30s
    parallel: true
    coverage_threshold: 80
    files:
      - "test/unit/managers/audio_manager_test.dart"
      - "test/unit/managers/module_manager_test.dart"
      - "test/unit/managers/save_manager_test.dart"
      - "test/unit/managers/analytics_manager_test.dart"
      - "test/unit/managers/parental_gate_manager_test.dart"
      - "test/unit/models/game_module_test.dart"
      - "test/unit/models/game_session_test.dart"
  
  widget_tests:
    enabled: true
    timeout: 60s
    parallel: false
    coverage_threshold: 70
    files:
      - "test/widget/screens/main_menu_screen_test.dart"
      - "test/widget/screens/module_selector_screen_test.dart"
      - "test/widget/screens/game_screen_test.dart"
      - "test/widget/screens/settings_screen_test.dart"
      - "test/widget/screens/parental_gate_screen_test.dart"
      - "test/widget/screens/celebration_screen_test.dart"
      - "test/widget/screens/loading_screen_test.dart"
      - "test/widget/components/button_test.dart"
      - "test/widget/components/card_test.dart"
  
  integration_tests:
    enabled: true
    timeout: 300s
    parallel: false
    coverage_threshold: 60
    files:
      - "test/integration/game_flow_test.dart"
      - "test/integration/navigation_test.dart"
      - "test/integration/data_persistence_test.dart"
      - "test/integration/audio_integration_test.dart"
  
  performance_tests:
    enabled: true
    timeout: 120s
    parallel: false
    coverage_threshold: 50
    files:
      - "test/performance/performance_test.dart"
      - "test/performance/memory_test.dart"
      - "test/performance/rendering_test.dart"
      - "test/performance/audio_performance_test.dart"
  
  error_handling_tests:
    enabled: true
    timeout: 90s
    parallel: false
    coverage_threshold: 40
    files:
      - "test/error_handling/error_handling_test.dart"
      - "test/error_handling/edge_cases_test.dart"
      - "test/error_handling/network_errors_test.dart"
      - "test/error_handling/storage_errors_test.dart"
  
  e2e_tests:
    enabled: true
    timeout: 600s
    parallel: false
    coverage_threshold: 30
    files:
      - "test/e2e/user_journey_test.dart"
      - "test/e2e/complete_game_flow_test.dart"
      - "test/e2e/parental_controls_test.dart"
      - "test/e2e/settings_persistence_test.dart"

# Test Environment Configuration
environment:
  default:
    flutter_version: "3.0.0+"
    dart_version: "3.0.0+"
    platform: "all"
    devices:
      - "android"
      - "ios"
      - "web"
      - "windows"
      - "macos"
      - "linux"
  
  ci:
    flutter_version: "3.0.0+"
    dart_version: "3.0.0+"
    platform: "android"
    devices:
      - "android_emulator"
    parallel: true
    timeout_multiplier: 2.0
  
  local:
    flutter_version: "3.0.0+"
    dart_version: "3.0.0+"
    platform: "all"
    devices:
      - "android_emulator"
      - "ios_simulator"
    parallel: false
    timeout_multiplier: 1.0

# Test Data Configuration
test_data:
  modules:
    count: 6
    categories: ["Learning", "Nature", "Social"]
    difficulty_levels: [1, 2, 3]
    age_ranges:
      min: 2
      max: 8
  
  game_sessions:
    max_sessions: 1000
    score_range:
      min: 0
      max: 1000
    moves_range:
      min: 0
      max: 100
  
  audio:
    formats: ["mp3", "wav", "ogg"]
    sample_rates: [44100, 48000]
    bit_rates: [128, 256, 320]
  
  images:
    formats: ["png", "jpg", "jpeg"]
    sizes: ["256x256", "512x512", "1024x1024"]
    color_depths: [8, 16, 24, 32]

# Performance Benchmarks
performance:
  load_time:
    main_menu: 2000ms
    module_selector: 1000ms
    game_screen: 1500ms
    settings: 800ms
  
  memory_usage:
    max_heap_size: 100MB
    max_allocations: 10000
    gc_frequency: 5s
  
  frame_rate:
    target: 60fps
    minimum: 30fps
    average: 55fps
  
  battery_usage:
    max_cpu_usage: 50%
    max_gpu_usage: 30%
    max_network_usage: 1MB/s

# Error Handling Configuration
error_handling:
  network_errors:
    timeout: 30s
    retry_attempts: 3
    retry_delay: 1s
  
  storage_errors:
    max_retries: 5
    retry_delay: 500ms
    fallback_enabled: true
  
  audio_errors:
    fallback_to_silence: true
    log_errors: true
    continue_on_error: true
  
  ui_errors:
    show_error_dialogs: false
    log_errors: true
    fallback_ui: true

# Test Reporting
reporting:
  formats: ["json", "xml", "html"]
  output_directory: "test_reports"
  include_coverage: true
  include_performance: true
  include_screenshots: true
  include_videos: false
  
  coverage:
    threshold: 80
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
      - "**/generated/**"
      - "**/test/**"
  
  performance:
    include_metrics: true
    include_profiling: true
    include_memory_usage: true
    include_cpu_usage: true

# CI/CD Configuration
ci_cd:
  triggers:
    - "push"
    - "pull_request"
    - "tag"
  
  stages:
    - name: "unit_tests"
      condition: "always"
      parallel: true
    
    - name: "widget_tests"
      condition: "unit_tests.success"
      parallel: false
    
    - name: "integration_tests"
      condition: "widget_tests.success"
      parallel: false
    
    - name: "performance_tests"
      condition: "integration_tests.success"
      parallel: false
    
    - name: "error_handling_tests"
      condition: "performance_tests.success"
      parallel: false
    
    - name: "e2e_tests"
      condition: "error_handling_tests.success"
      parallel: false
  
  notifications:
    success:
      - "email"
      - "slack"
    failure:
      - "email"
      - "slack"
      - "webhook"
  
  artifacts:
    - "test_reports/"
    - "coverage/"
    - "performance_reports/"
    - "screenshots/"

# Test Utilities
utilities:
  test_helpers:
    enabled: true
    path: "test/utils/test_helpers.dart"
  
  mocks:
    enabled: true
    path: "test/mocks/"
  
  fixtures:
    enabled: true
    path: "test/fixtures/"
  
  data_factories:
    enabled: true
    path: "test/factories/"

# Test Maintenance
maintenance:
  auto_update: true
  dependency_check: true
  security_scan: true
  code_quality: true
  
  cleanup:
    old_reports: "30d"
    old_artifacts: "7d"
    old_screenshots: "3d"
  
  monitoring:
    test_flakiness: true
    performance_regression: true
    coverage_regression: true
    error_trends: true
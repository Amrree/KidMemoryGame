name: kid_memory_template_test
description: Test configuration for Kid Memory Template

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # Utilities
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  test: ^1.24.6
  fake_async: ^1.3.1

flutter:
  uses-material-design: true